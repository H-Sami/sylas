version: '3.8'

services:
  sylas:
    build:
      context: .
      dockerfile: Dockerfile
    image: sylas:latest
    container_name: sylas
    volumes:
      - ./:/app:ro
      - ./results:/app/results
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - TARGET_REPO=${TARGET_REPO}
    stdin_open: true
    tty: true
    command: python -m agent.main /app --trivy --auto-pr
    
  trivy-scanner:
    image: aquasec/trivy:latest
    container_name: trivy-scanner
    volumes:
      - ./:/workspace
      - trivy-cache:/root/.cache/trivy
    command: fs /workspace
    
  bandit-scanner:
    build:
      context: .
      dockerfile: Dockerfile
    image: sylas:latest
    container_name: bandit-scanner
    command: python -m bandit -r /app -f json -o /app/results/bandit.json
    
volumes:
  trivy-cache: