agent:
  name: "Security Remediation Agent (Scanner Edition)"
  version: "0.9.0"

scanner:
  default_scanner: "json"
  trivy_enabled: true
  scan_timeout: 300

remediation:
  auto_update_dependencies: true

verification:
  run_tests_after_fix: true
  default_test_command: "pytest"

git:
  default_branch_name: "remediation-fix"
  auto_create_pr: true
  pr_target_branch: "main"
  protected_branches:
    - "main"
    - "master"
    - "develop"

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
