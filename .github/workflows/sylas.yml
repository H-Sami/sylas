name: Sylas

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target path or repo URL to scan'
        required: false
        default: '.'
  repository_dispatch:
    types: [security-scan]
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Trivy
        run: |
          sudo apt-get update
          wget https://github.com/aquasecurity/trivy/releases/download/v0.54.1/trivy_0.54.1_linux-amd64.deb
          sudo dpkg -i trivy_0.54.1_linux-amd64.deb

      - name: Run Trivy vulnerability scan
        run: |
          trivy fs --format sarif --output trivy-results.sarif .
          trivy fs --format json --output trivy-results.json .

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-security-results@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

      - name: Upload Trivy results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.json
          retention-days: 30

      - name: Comment scan results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('trivy-results.json', 'utf8'));
            const vulnCount = results.Results?.reduce((acc, r) => acc + (r.Vulnerabilities?.length || 0), 0) || 0;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Security Scan Results\n\nTrivy found **${vulnCount}** vulnerabilities.\n\nSee artifacts for full details.`
            });

  remediate:
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Trivy
        run: |
          sudo apt-get update
          wget https://github.com/aquasecurity/trivy/releases/download/v0.54.1/trivy_0.54.1_linux-amd64.deb
          sudo dpkg -i trivy_0.54.1_linux-amd64.deb

      - name: Install agent dependencies
        run: |
          pip install flask pytest

      - name: Create remediation branch
        run: |
          git checkout -b remediation-fix

      - name: Run Sylas
        run: |
          python -m agent.main . --trivy --auto-pr || echo "Agent completed"

      - name: Create remediation PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const branch = 'remediation-fix';
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Security: Auto-remediation of vulnerabilities',
              head: branch,
              base: 'main',
              body: '## Automated Security Remediation\n\nThis PR was created by Sylas.\n\nPlease review and merge if all checks pass.'
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.data.number,
              state: 'open'
            });
