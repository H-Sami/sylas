name: Sylas

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target path or repo URL to scan'
        required: false
        default: '.'
  repository_dispatch:
    types: [security-scan]
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'           # Don't fail the job on findings
          ignore-unfixed: true
          vuln-type: 'os,library'

      - name: Run Trivy JSON report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Upload Trivy results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.json
          retention-days: 30

      - name: Comment scan results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const results = JSON.parse(fs.readFileSync('trivy-results.json', 'utf8'));
              const vulnCount = results.Results?.reduce((acc, r) => acc + (r.Vulnerabilities?.length || 0), 0) || 0;
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## Security Scan Results\n\nTrivy found **${vulnCount}** vulnerabilities (HIGH+).\n\nSee artifacts for full details.`
              });
            } catch (e) {
              console.log("Could not read JSON report for comment");
            }

  # remediate job remains the same (you can keep it as-is)
  remediate:
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Trivy & dependencies
        run: |
          sudo apt-get update
          wget -qO - https://github.com/aquasecurity/trivy/releases/latest/download/trivy_$(curl -s https://api.github.com/repos/aquasecurity/trivy/releases/latest | grep tag_name | cut -d '"' -f 4 | sed 's/v//').linux-amd64.deb > trivy.deb
          sudo dpkg -i trivy.deb && rm trivy.deb
          pip install flask pytest

      - name: Create remediation branch
        run: git checkout -b remediation-fix

      - name: Run Sylas
        run: python -m agent.main . --trivy --auto-pr || echo "Agent completed"

      - name: Create remediation PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const branch = 'remediation-fix';
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Security: Auto-remediation of vulnerabilities',
              head: branch,
              base: 'main',
              body: '## Automated Security Remediation\n\nThis PR was created by Sylas.'
            });
